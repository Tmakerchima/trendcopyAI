<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录 - TrendCopy AI</title>
    <link rel="icon" href="./assets/logo-ai.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./dashboard.css" />
  </head>
  <body>
    <header class="login-header">
      <a class="brand" href="/">
        <img class="brand-mark" src="./assets/logo-ai.svg" alt="" />
        <span>TrendCopy AI</span>
      </a>
    </header>

    <main class="login-page">
      <section class="login-column" aria-labelledby="login-title">
        <div class="login-copy">
          <h1 id="login-title">Create faster,<br />publish smarter</h1>
          <p>Turn fresh AI trends into posts your audience can read today.</p>
        </div>

        <div class="login-card" aria-label="登录或注册">
          <p class="login-error" id="login-error" hidden></p>
          <p class="login-success" id="login-success" hidden></p>

          <a class="provider-button" href="/api/auth/google">
            <span class="provider-icon google">G</span>
            <span>Continue with Google</span>
          </a>

          <a class="provider-button" href="/api/auth/qq">
            <span class="provider-icon qq">Q</span>
            <span>Continue with QQ</span>
          </a>

          <a class="provider-button" href="/api/auth/weixin">
            <span class="provider-icon wechat">W</span>
            <span>Continue with WeChat</span>
          </a>

          <div class="divider"><span>OR</span></div>

          <form class="email-form" id="email-form">
            <input id="email" name="email" type="email" autocomplete="email" placeholder="Enter your email" required />
            <button class="email-button" id="send-code-button" type="submit">Continue with email</button>
          </form>

          <form class="code-form" id="code-form" hidden>
            <input id="code" name="code" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" placeholder="Enter the 6-digit code" required />
            <button class="email-button" type="submit">Continue</button>
            <button class="text-button" id="change-email-button" type="button">更换邮箱</button>
          </form>

          <p class="legal">By continuing, you agree to use TrendCopy AI to generate and manage creator content.</p>
        </div>
      </section>
    </main>
    <script src="./dashboard.js"></script>
  </body>
</html>
