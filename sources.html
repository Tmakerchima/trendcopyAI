<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sources - TrendCopy AI</title>
    <link rel="icon" href="./assets/logo-ai.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-left">
        <a class="brand" href="./index.html#app" aria-label="TrendCopy AI 首页">
          <img class="brand-mark" src="./assets/logo-ai.svg" alt="" />
          <span>TrendCopy AI</span>
        </a>
      </div>
      <nav class="top-nav" aria-label="主导航">
        <a href="./index.html#app">生成器</a>
        <a href="./sources.html">热点来源</a>
        <a href="./pricing.html">价格</a>
      </nav>
      <div class="auth-menu" aria-label="登录">
        <a class="login-button" id="auth-link" href="/dashbord">登录</a>
      </div>
    </header>

    <main>
      <section class="content-band standalone-page" id="sources" aria-labelledby="sources-title">
        <div class="section-heading">
          <p class="eyebrow">Sources</p>
          <h2 id="sources-title">自动从公开热点里找内容机会。</h2>
        </div>
        <div class="seo-grid">
          <article>
            <span>01</span>
            <h3>官方博客 / 文档</h3>
            <p>优先寻找产品官方发布、模型文档、更新公告和原始说明。</p>
          </article>
          <article>
            <span>02</span>
            <h3>新闻 / 搜索结果</h3>
            <p>检索最近新闻和相关报道，保留可点击来源供你核查。</p>
          </article>
          <article>
            <span>03</span>
            <h3>GitHub / Product Hunt</h3>
            <p>适合发现新项目、新工具、开发者讨论和产品发布。</p>
          </article>
          <article>
            <span>04</span>
            <h3>社区讨论</h3>
            <p>补充论坛、X、Reddit 等讨论信号，辅助判断内容角度。</p>
          </article>
        </div>
      </section>
    </main>
  </body>
